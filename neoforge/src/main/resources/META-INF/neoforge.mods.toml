modLoader = "javafml"
loaderVersion = "[1,)"
license = "MIT"

[[mods]]
modId = "betterbrightness"
version = "${version}"
displayName = "Better Brightness Setup"
authors = "fimkov"
logoFile = "icon.png"
logoBlur = false
description = '''
Improves Minecraft's brightness setup and adds a first-launch calibration screen that previews how bright the game will actually look.
'''

# Gamma-persistence mixin (widens gamma's ValueSet to the [0, 5.0] ceiling so values up to 500% persist).
# The config JSON + mixin class are bundled from :common into this jar by shadowJar. Client-only (see
# "client" array in the JSON).
[[mixins]]
config = "betterbrightness.mixins.json"

# Sodium optional mixin config (required=false → no-op when Sodium is absent).
[[mixins]]
config = "betterbrightness.sodium.mixins.json"

[[dependencies.betterbrightness]]
modId = "neoforge"
type = "required"
versionRange = "[26.2,)"
ordering = "NONE"
side = "CLIENT"

[[dependencies.betterbrightness]]
modId = "minecraft"
type = "required"
versionRange = "[26.2,26.3)"
ordering = "NONE"
side = "CLIENT"

[[dependencies.betterbrightness]]
modId = "architectury"
type = "required"
versionRange = "[21.0,)"
ordering = "AFTER"
side = "CLIENT"

# Cloth Config is a hard runtime requirement: client init eagerly calls AutoConfig.register, which
# class-loads me.shedaniel.autoconfig.* immediately. Declaring it required gives the user the loader's
# clean "missing dependency" screen instead of a raw NoClassDefFoundError. NeoForge modId uses underscore.
[[dependencies.betterbrightness]]
modId = "cloth_config"
type = "required"
versionRange = "[26.2.155,)"
ordering = "AFTER"
side = "CLIENT"
