modLoader = "javafml"
loaderVersion = "[1,)"
license = "MIT"

[[mods]]
modId = "betterbrightness"
version = "${version}"
displayName = "Better Brightness Setup"
authors = "fimkov"
description = '''
First-launch brightness-calibration screen.
'''

# Gamma-persistence mixin (widens gamma's ValueSet to [0, 2]). The config JSON + mixin class are
# bundled from :common into this jar by shadowJar. Client-only (see "client" array in the JSON).
[[mixins]]
config = "betterbrightness.mixins.json"

[[dependencies.betterbrightness]]
modId = "neoforge"
type = "required"
versionRange = "[26.2,)"
ordering = "NONE"
side = "CLIENT"

[[dependencies.betterbrightness]]
modId = "minecraft"
type = "required"
versionRange = "[26.2,26.3)"
ordering = "NONE"
side = "CLIENT"

[[dependencies.betterbrightness]]
modId = "architectury"
type = "required"
versionRange = "[21.0,)"
ordering = "AFTER"
side = "CLIENT"
