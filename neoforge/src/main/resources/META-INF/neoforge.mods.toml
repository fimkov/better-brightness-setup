modLoader = "javafml"
loaderVersion = "[1,)"
license = "MIT"

[[mods]]
modId = "betterbrightness"
version = "${version}"
displayName = "Better Brightness Setup"
authors = "fimkov"
logoFile = "icon.png"
logoBlur = false
description = '''
Improves Minecraft's brightness setup and adds a first-launch calibration screen that previews how bright the game will actually look.
'''

[[mixins]]
config = "betterbrightness.mixins.json"

[[mixins]]
config = "betterbrightness.sodium.mixins.json"

[[dependencies.betterbrightness]]
modId = "neoforge"
type = "required"
versionRange = "[26.2,)"
ordering = "NONE"
side = "CLIENT"

[[dependencies.betterbrightness]]
modId = "minecraft"
type = "required"
versionRange = "[26.2,26.3)"
ordering = "NONE"
side = "CLIENT"

[[dependencies.betterbrightness]]
modId = "architectury"
type = "required"
versionRange = "[21.0,)"
ordering = "AFTER"
side = "CLIENT"

[[dependencies.betterbrightness]]
modId = "cloth_config"
type = "required"
versionRange = "[26.2.155,)"
ordering = "AFTER"
side = "CLIENT"
