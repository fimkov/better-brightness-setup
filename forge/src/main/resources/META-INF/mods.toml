modLoader = "javafml"
loaderVersion = "[47,)"
license = "MIT"

[[mods]]
modId = "betterbrightness"
version = "${version}"
displayName = "Better Brightness Setup"
authors = "fimkov"
logoFile = "icon.png"
logoBlur = false
description = '''
Improves Minecraft's brightness setup and adds a first-launch calibration screen that previews how bright the game will actually look.
'''

[[mixins]]
config = "betterbrightness.mixins.json"

[[dependencies.betterbrightness]]
modId = "forge"
type = "required"
versionRange = "[47,)"
ordering = "NONE"
side = "CLIENT"

[[dependencies.betterbrightness]]
modId = "minecraft"
type = "required"
versionRange = "[1.20.1,1.21)"
ordering = "NONE"
side = "CLIENT"

[[dependencies.betterbrightness]]
modId = "architectury"
type = "required"
versionRange = "[9.2,)"
ordering = "AFTER"
side = "CLIENT"

[[dependencies.betterbrightness]]
modId = "cloth_config"
type = "required"
versionRange = "[11.1,)"
ordering = "AFTER"
side = "CLIENT"
